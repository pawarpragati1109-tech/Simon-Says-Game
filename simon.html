<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="simo.css">
</head>
<body>

    <div class="game-container">

        <h1>🎮 Simon Says</h1>

        <p class="subtitle">
            Repeat the sequence correctly to reach the highest level.
        </p>

        <h2>Press any key to start</h2>

        <!-- Best Score Card -->
        <div class="best-score-card">
            <span class="best-title">🏆 BEST SCORE</span>
            <h3 id="high-score">0</h3>
        </div>

        <div class="btn-container">

            <div class="line-one">
                <div class="btn red" id="red"></div>
                <div class="btn yellow" id="yellow"></div>
            </div>

            <div class="line-two">
                <div class="btn green" id="green"></div>
                <div class="btn purple" id="purple"></div>
            </div>

        </div>

    </div>

    <script src="simons.js"></script>

</body>
</html>
